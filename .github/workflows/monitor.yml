name: AppStoreSpy Single Query Niche Monitor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - production
      notify:
        description: "Send Telegram alerts"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APPSTORESPY_API_KEY: ${{ secrets.APPSTORESPY_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run monitor
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
            NOTIFY="${{ inputs.notify }}"
          else
            MODE="production"
            NOTIFY="true"
          fi
          echo "event_name=${{ github.event_name }}"
          echo "mode=$MODE"
          echo "notify=$NOTIFY"
          if [ "$MODE" = "production" ] && [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is required for production AI baseline review."
            exit 1
          fi
          ARGS=(--mode "$MODE")
          if [ "$NOTIFY" = "true" ]; then
            ARGS+=(--notify)
          fi
          python -m appstorespy_niche_monitor "${ARGS[@]}"

      - name: Generate weekly digest
        if: github.event_name == 'schedule' && github.event.schedule == '0 7 * * *'
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            python -m appstorespy_niche_monitor --weekly-digest
          else
            echo "Weekly digest is generated on Mondays only."
          fi

      - name: Commit generated history and reports
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" = "dry-run" ]; then
            echo "Skipping generated file commit for manual dry-run."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sent_alerts.json data/feedback.json data/feedback.jsonl data/feedback_migration_state.json
          git add -f data/raw data/processed data/history reports
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Store AppStoreSpy monitor snapshot"
            git push
          fi
