{
  "app": {
    "name": "appstorespy_niche_monitor",
    "mode": "production",
    "timezone": "UTC",
    "score_version": "v1.3.2",
    "sample_data_path": "data/sample/sample_apps.json"
  },
  "platforms": ["google_play"],
  "collection": {
    "mode": "single_query",
    "platform": "google_play",
    "endpoint": "/play/apps/query",
    "limit": 10000,
    "request_timeout_seconds": 180,
    "page": 1,
    "sort": "-release_date",
    "release_date_days_back": 180,
    "min_downloads_daily": 500,
    "include_country": false,
    "include_language": false,
    "include_active_countries": false,
    "allow_pagination": false,
    "max_api_requests_per_run": 1,
    "fields": [
      "id",
      "name",
      "bundle",
      "developer_name",
      "developer_id",
      "category",
      "category_type",
      "downloads_daily",
      "downloads_month",
      "revenue_month",
      "downloads_exact",
      "downloads_mark",
      "rating_avg",
      "rating_count",
      "review_count",
      "release_date",
      "update_date",
      "iap",
      "advertised",
      "ads",
      "icon",
      "screenshots",
      "description_short",
      "description_full",
      "url_appstorespy",
      "url",
      "website"
    ]
  },
  "filters": {
    "published": true,
    "category_type": "GAME"
  },
  "coverage": {
    "expected_full_window": true,
    "warn_if_total_count_gt_limit": true,
    "fail_if_total_count_gt_limit": false
  },
  "classification": {
    "use_rule_based_classifier": true,
    "use_llm_for_uncertain_apps": false,
    "min_confidence_for_hard_label": 0.7,
    "unknown_pattern_enabled": true,
    "normalize_aliases": true,
    "aliases": {
      "sort_puzzle": {
        "aliases": ["sorting", "color sort", "water sort", "goods sort", "shelf sort"],
        "niche": "sort puzzle",
        "core_mechanic": "sort"
      }
    }
  },
  "aggregation": {
    "use_hierarchical_groups": true,
    "group_keys": [
      "normalized_niche",
      "core_mechanic",
      "core_mechanic_theme",
      "core_mechanic_theme_meta",
      "market_category_core_mechanic"
    ],
    "do_not_hard_group_by_audience": true
  },
  "scoring": {
    "use_percentile_demand_after_snapshots": 7,
    "min_snapshots_for_growth_score": 2,
    "use_bayesian_rating": true,
    "use_mvp_feasibility": true,
    "data_quality_is_confidence_not_kill_switch": true,
    "neutral_monetization_score": 6
  },
  "candidate_generation": {
    "alert": {
      "min_opportunity_score": 70,
      "min_total_daily_installs": 5000,
      "min_apps_in_niche": 2,
      "min_successful_new_apps": 1,
      "min_data_quality_score": 65,
      "min_mvp_feasibility_score": 60,
      "max_giant_developer_share": 0.7,
      "block_severe_paid_spike": true
    },
    "watch": {
      "min_opportunity_score": 50,
      "min_total_daily_installs": 2000,
      "min_apps_in_niche": 2,
      "min_data_quality_score": 45,
      "min_mvp_feasibility_score": 50
    },
    "single_app_watch": {
      "min_top_app_daily_installs": 3000,
      "min_data_quality_score": 40,
      "min_mvp_feasibility_score": 50,
      "allow_leader_dominated": true
    },
    "near_miss": {
      "min_opportunity_score": 60,
      "max_failed_alert_conditions": 2,
      "include_in_report": true
    }
  },
  "thresholds": {
    "new_app_days": 180,
    "recently_updated_days": 90,
    "successful_new_app_daily_installs": 500,
    "top_app_dominance_share": 0.8
  },
  "alert_rules": {
    "min_opportunity_score": 70,
    "min_total_daily_installs": 5000,
    "min_apps_in_niche": 2,
    "min_successful_new_apps": 1,
    "max_giant_developer_share": 0.7,
    "cooldown_days": 7,
    "max_top_app_share": 0.75,
    "min_data_quality_score": 65,
    "disallow_high_production_complexity": true
  },
  "giant_developers": [
    "Roblox",
    "Garena",
    "King",
    "Supercell",
    "Playrix",
    "Tencent",
    "Electronic Arts",
    "EA",
    "Zynga",
    "Scopely",
    "Moon Active",
    "NetEase",
    "Niantic",
    "HoYoverse"
  ],
  "production_scores": {
    "arrow puzzle": 15,
    "block puzzle": 14,
    "tile match": 13,
    "mahjong": 13,
    "sort puzzle": 14,
    "word puzzle": 12,
    "coloring": 12,
    "hidden object": 10,
    "merge": 9,
    "ludo": 8,
    "idle tycoon": 7,
    "runner": 8,
    "match-3": 6,
    "shooter": 2,
    "sandbox": 1,
    "other": 3
  },
  "niche_rules": {
    "arrow puzzle": {"keywords": ["arrow", "arrows", "arrow puzzle"]},
    "block puzzle": {"keywords": ["block", "block blast", "block puzzle"]},
    "tile match": {"keywords": ["tile", "triple match", "match tile", "tile master"]},
    "mahjong": {"keywords": ["mahjong"]},
    "sort puzzle": {"keywords": ["sort", "sorting", "water sort", "ball sort", "goods sort"]},
    "word puzzle": {"keywords": ["word", "crossword", "word search"]},
    "hidden object": {"keywords": ["hidden object", "find objects", "seek and find"]},
    "coloring": {"keywords": ["coloring", "color by number", "paint"]},
    "merge": {"keywords": ["merge"]},
    "ludo": {"keywords": ["ludo"]},
    "idle tycoon": {"keywords": ["idle", "tycoon"]},
    "runner": {"keywords": ["runner", "run"]},
    "sandbox": {"keywords": ["roblox", "sandbox", "craft", "minecraft"]},
    "shooter": {"keywords": ["shooter", "gun", "battle royale", "fps"]},
    "match-3": {"keywords": ["match-3", "match 3", "candy", "jewel"]}
  },
  "dimension_rules": {
    "market_category": {
      "puzzle": ["puzzle", "sort", "match", "mahjong", "word", "hidden object", "coloring"],
      "casual": ["casual", "runner", "idle", "merge", "ludo"],
      "arcade": ["arcade", "runner", "shooter"],
      "simulation": ["simulation", "tycoon"],
      "board": ["board", "ludo", "mahjong"],
      "word": ["word", "crossword"],
      "card": ["card"]
    },
    "core_mechanic": {
      "sort": ["sort", "sorting", "water sort", "ball sort", "goods sort"],
      "merge": ["merge"],
      "match": ["match", "tile", "mahjong", "block", "candy", "jewel"],
      "search": ["hidden object", "find objects", "seek and find"],
      "decorate": ["decorate", "renovation", "home"],
      "collect": ["collection", "collect"],
      "idle": ["idle", "tycoon"],
      "runner": ["runner", "run"],
      "physics": ["physics", "ball"],
      "trivia": ["trivia", "quiz"]
    },
    "theme": {
      "supermarket": ["supermarket", "goods", "shop", "store"],
      "home": ["home", "house", "renovation", "decor"],
      "animals": ["animal", "pet", "cat", "dog"],
      "cars": ["car", "racing", "parking"],
      "food": ["food", "cooking", "restaurant"],
      "fashion": ["fashion", "dress", "makeover"],
      "fantasy": ["fantasy", "dragon", "magic"],
      "social": ["social", "party", "friends"],
      "meme": ["meme", "viral"],
      "abstract": ["block", "tile", "arrow", "color"]
    },
    "meta": {
      "renovation": ["renovation", "home", "decorate"],
      "collection": ["collection", "collect", "album"],
      "story": ["story", "chapter"],
      "levels": ["level", "levels"],
      "events": ["event", "season"],
      "leaderboard": ["leaderboard", "rank"],
      "customization": ["customize", "skin", "outfit"]
    },
    "audience": {
      "kids": ["kids", "children", "baby"],
      "teens": ["teen", "anime"],
      "women_25_45": ["home", "fashion", "makeover", "coloring", "hidden object", "supermarket"],
      "men_18_35": ["shooter", "battle", "racing", "sports"],
      "seniors": ["word", "crossword", "mahjong"],
      "broad": ["puzzle", "casual", "block", "tile", "sort"]
    }
  },
  "classification_dimensions": {
    "market_category": ["puzzle", "casual", "arcade", "simulation", "board", "word", "card", "action", "other"],
    "core_mechanic": ["sort", "merge", "match", "search", "decorate", "collect", "idle", "runner", "physics", "trivia", "other"],
    "theme": ["supermarket", "home", "animals", "cars", "food", "fashion", "fantasy", "social", "meme", "abstract", "other"],
    "meta": ["renovation", "collection", "story", "levels", "events", "leaderboard", "customization", "none"],
    "audience": ["kids", "teens", "women_25_45", "men_18_35", "seniors", "broad", "unknown"],
    "production_complexity": ["low", "medium", "high", "unknown"]
  },
  "data_quality": {
    "min_score_for_alert": 65,
    "required_fields": [
      "downloads_daily",
      "downloads_month",
      "revenue_month",
      "release_date",
      "update_date",
      "developer_name"
    ],
    "penalize_missing_revenue": true,
    "penalize_low_sample_size": true,
    "min_apps_for_reliable_signal": 3,
    "one_app_growth_penalty_threshold": 0.7
  },
  "feedback": {
    "enabled": true,
    "canonical_format": "jsonl",
    "path": "data/feedback.jsonl",
    "legacy_path": "data/feedback.json",
    "migration": {
      "enabled": true,
      "strategy": "one_time_legacy_json_to_jsonl",
      "read_legacy_json_only_for_migration": true,
      "read_legacy_json_during_normal_runtime": false,
      "support_dual_runtime_formats": false,
      "auto_migrate_legacy_json_to_jsonl": true,
      "write_legacy_json": false,
      "create_backup_before_migration": true,
      "backup_path_template": "data/feedback.migrated.{timestamp}.json",
      "migration_state_path": "data/feedback_migration_state.json",
      "deduplicate_on_migration": true,
      "fail_on_invalid_legacy_json": false,
      "log_invalid_legacy_entries": true
    },
    "apply_weight_adjustments": true,
    "max_weight_adjustment_abs": 0.2,
    "allowed_statuses": ["good", "maybe", "false_positive", "already_known", "too_complex", "too_competitive", "paid_spike"],
    "allowed_verdicts": ["good", "maybe", "false_positive", "already_known", "too_complex", "too_competitive", "paid_spike"],
    "allowed_reasons": [
      "paid_spike",
      "one_app_growth",
      "giant_dominated",
      "too_complex",
      "no_monetization",
      "weak_data_quality",
      "clone_market",
      "not_a_gameplay_trend",
      "other"
    ]
  },
  "alert_limits": {
    "max_alerts_per_run": 3,
    "max_watch_items_per_digest": 10,
    "max_single_app_watch_items": 5,
    "max_near_misses_in_report": 20,
    "cooldown_days": 7
  },
  "first_run_behavior": {
    "save_baseline_snapshot": true,
    "send_regular_alerts": false,
    "send_initial_baseline_digest": true,
    "max_initial_digest_items": 10,
    "include_statuses_in_initial_digest": ["ALERT", "WATCH", "SINGLE_APP_WATCH", "NEAR_MISS"],
    "required_reason_code": "INITIAL_BASELINE_NO_HISTORY",
    "max_confidence_level": "MEDIUM",
    "write_initial_digest_items_to_sent_alerts": false,
    "allow_regular_alerts_from_second_run": true,
    "allow_growth_based_alerts_after_snapshots": 7
  },
  "llm": {
    "enabled": true,
    "model_env": "OPENAI_MODEL",
    "default_model": "gpt-4.1-mini",
    "max_output_tokens": 6000,
    "timeout_seconds": 60
  },
  "telegram": {
    "enabled": true,
    "notify_on_completion": true,
    "bot_token_env": "TELEGRAM_BOT_TOKEN",
    "chat_id_env": "TELEGRAM_CHAT_ID",
    "max_message_chars": 3900
  },
  "storage": {
    "raw_dir": "data/raw",
    "processed_dir": "data/processed",
    "history_dir": "data/history",
    "sent_alerts_path": "data/sent_alerts.json",
    "feedback_path": "data/feedback.jsonl",
    "reports_alerts_dir": "reports/alerts",
    "reports_daily_dir": "reports/daily",
    "reports_weekly_dir": "reports/weekly"
  }
}
